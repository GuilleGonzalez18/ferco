# Plantilla de propiedades para una empresa.
# Copiar este archivo como prop-{company_name}.properties y completar los valores.
# Las líneas que empiezan con # son comentarios.
# Las env vars explícitas del dashboard de Render tienen PRECEDENCIA sobre este archivo.

# ── Servidor ────────────────────────────────────────────────────────────────
PORT=3001
CORS_ORIGIN=

# ── Base de datos (PostgreSQL) ───────────────────────────────────────────────
PGHOST=
PGPORT=5432
PGDATABASE=
PGUSER=
PGPASSWORD=

# ── Autenticación ───────────────────────────────────────────────────────────
JWT_SECRET=
JWT_EXPIRES_IN=7d

# ── Email (SMTP / Brevo) ────────────────────────────────────────────────────
SMTP_HOST=
SMTP_PORT=587
SMTP_SECURE=false
SMTP_USER=
SMTP_PASS=
SMTP_FROM=
BREVO_API_KEY=

# ── Recuperación de contraseña ──────────────────────────────────────────────
RESET_CODE_TTL_MINUTES=10

# ── CFE / Facturación electrónica DGI ───────────────────────────────────────
CFE_HABILITADO=false
CFE_TIMEOUT_MS=20000
CFE_PRUEBAS_URL=
CFE_PRUEBAS_TOKEN=
CFE_PRODUCCION_URL=
CFE_PRODUCCION_TOKEN=

# ── Herramientas de base de datos (solo dev/ops local) ───────────────────────
PG_DUMP_BIN=pg_dump
PSQL_BIN=psql
DUMP_FILE=db-export.sql
